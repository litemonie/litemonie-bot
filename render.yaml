# Main Telegram Bot Service
- type: web
  name: litemonie-bot
  env: node
  repo: https://github.com/litemonie/litemonie.git
  branch: main
  buildCommand: npm install
  startCommand: node index.js
  healthCheckPath: /health
  autoDeploy: true
  disk:
    name: litemonie-data
    mountPath: /data
    sizeGB: 1
  envVars:
    - key: NODE_VERSION
      value: 18.17.0
    - key: BOT_TOKEN
      sync: false
    - key: VTU_API_KEY
      sync: false
    - key: ADMIN_ID
      value: "1279640125"
    - key: MONNIFY_API_KEY
      sync: false
    - key: MONNIFY_SECRET_KEY
      sync: false
    - key: MONNIFY_CONTRACT_CODE
      sync: false
    - key: MONNIFY_BASE_URL
      value: "https://sandbox.monnify.com"
    - key: MONNIFY_WEBHOOK_SECRET
      sync: false
    - key: BANK_TRANSFER_API_KEY
      sync: false
    - key: NODE_ENV
      value: production

# Device Lock Mini App (Static Site)
- type: web
  name: device-lock-mini-app
  env: static
  repo: https://github.com/opuenekeke/render-device-lock-app
  branch: main
  buildCommand: echo "Static site, no build needed"
  staticPublishPath: ./
  envVars:
    - key: NODE_VERSION
      value: 18.17.0